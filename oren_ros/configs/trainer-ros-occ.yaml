cfg_identifier: oren.trainer_config.TrainerConfig
trainer_identifier: oren.occ_trainer.OccTrainer   # oren.sdf_trainer.SdfTrainer | oren.occ_trainer.OccTrainer
seed: 12345
log_dir: logs
exp_name: oren_ros_occ
device: cuda
data:
    cfg_identifier: oren.dataset.data_config.DataConfig
    dataset_name: ros
    dataset_args:
        min_depth: 0.8
        max_depth: 40.0
    apply_bound: false   # if false, bbox crop is applied after generate_sdf_samples via valid_mask
    bound_min:           # null -> derived/supplied at runtime by ROS service request
    bound_max:
    start_frame: 0
    end_frame: -1
bound_min: [-10, -10, -10] # used for mesh extraction; auto-overwritten from dataset bounds at trainer init
bound_max: [10, 10, 10]
key_frame_set:
    cfg_identifier: oren.key_frame_set.KeyFrameSetConfig
    insert_method: intersection
    insert_interval: 50
    insert_ratio: 0.7
    frame_selection: multiple_max_set_coverage
    selection_window_size: 8
    frame_weight: uniform
model_identifier: oren.occ_network.OccNetwork
model:
    cfg_identifier: oren.occ_network.OccNetworkConfig
    octree_cfg:
        cfg_identifier: oren.octree_config.OctreeConfig
        resolution: 0.7
        tree_depth: 8 # 0.7*2^8=112m
        semi_sparse_depth: 5
        init_voxel_num: 80000
        insertion_threshold: 3
        skip_insertion_if_exists: true # speed up a bit
        independent_smallest_leaf_vertex: false
    field:
        cfg_identifier: oren.field_storage_config.FieldStorageConfig
        name: occ
        output_dim: 1
        mode: implicit
        # explicit_prior_init: 0.0
        # gradient_augmentation: false
        implicit_feature_dim: 2
        implicit_feature_level: 1
        implicit_feature_aggregation: cat
        shared_bank:
        auxiliary_banks: []
        implicit_net_cfg:
            cfg_identifier: oren.implicit_net.ImplicitNetConfig
            mlp_activation: LeakyReLU
            hidden_dims: [32, 32]
            normalization:
            output_scale: 1.0
            output_dim: 1
            input_dim: 1
criterion_identifier: oren.occ_criterion.OccCriterion
criterion:
    cfg_identifier: oren.occ_criterion.OccCriterionConfig
    surface_target: 1.0
    surface_loss_prior_weight: 0.0
    free_loss_prior_weight: 0.0
    occ_loss_prior_weight: 0.0
    surface_loss_weight: 1.0
    free_loss_weight: 1.0
    occ_loss_weight: 1.0
    occ_loss_mode: bce
    occ_loss_hinge_margin: 1.0
    smoothness_weight: 0.0
    smoothness_eps: 0.01
num_init_frames: 3
init_frame_iterations: 10
num_iterations_per_frame: 1
num_rays_total: 20480
extra_surface_sample: false # not helpful
frame_downsample: 10
sample_rays:
    cfg_identifier: oren.utils.sampling.SampleRaysConfig
    n_stratified: 1
    n_perturbed_pos: 1
    n_perturbed_neg: 1
    depth_min: 0.8
    depth_max: 40.0
    surface_margin: 1.44
    sigma_s_pos: 0.48
    sigma_s_neg: 0.48
batch_size: 204800
lr: 0.001
grad_method: finite_difference   # unused for OccCriterion (needs_grad=False), kept for config compatibility
finite_difference_eps: 0.03
final_iterations: 0
save_mesh: true
mesh_resolution: 0.2
mesh_iso_value: 3.0
clean_mesh: true
ckpt_interval: -1
profiling: false
profiling_verbose: false
