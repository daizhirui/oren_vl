base_config: trainer-ros-sdf.yaml

exp_name: oren_ros_realsense_sdf

data:
    dataset_args:
        min_depth: 0.3
        max_depth: 4.0
        # RealSense D455 848x480 intrinsics
        intrinsics_fx: 429.47845458984375
        intrinsics_fy: 429.47845458984375
        intrinsics_cx: 429.2593078613281
        intrinsics_cy: 243.30862426757812
    apply_bound: false
    # Indoor realsense scene (~6 x 5 x 2.3 m room)
    bound_min: [-3.0, -2.5, 0.0]
    bound_max: [3.0, 2.5, 2.3]

bound_min: [-3.0, -2.5, 0.0]  # auto-overwritten from data.bound_* at trainer init
bound_max: [3.0, 2.5, 2.3]
key_frame_set:
    insert_ratio: 0.9
    selection_window_size: 16
model:
    octree_cfg:
        # Bag motion: x∈[-2.78, 3.11], y∈[-2.05, 1.51], z∈[0.06, 1.54];
        # plus 5 m max sample depth -> need >=±~8 m. 0.1 * 2^8 = 25.6 m covers it.
        # init_voxel_num is a hard cap on Python-side priors / C++ vertex IDs
        # (the prior buffers never grow). 2M comfortably covers a 25.6 m octree
        # at 0.1 m for the full 70 s bag without overflowing vertex indices.
        resolution: 0.2
        tree_depth: 9
        semi_sparse_depth: 6
        init_voxel_num: 4000000
        insertion_threshold: 8
        implicit_feature_dim: 2
        implicit_num_levels: 1
    residual_net_cfg:
        hidden_dims: [32, 32]
        output_scale: 0.1
criterion:
    boundary_loss_weight: 100
    perturbation_loss_weight: 500
    boundary_loss_prior_weight: 100
    perturbation_loss_prior_weight: 500
num_rays_total: 10240
sample_rays:
    depth_min: 0.3
    depth_max: 4.0
    n_perturbed_pos: 1
    n_perturbed_neg: 1
    surface_margin: 0.15
    sigma_s_pos: 0.03
    sigma_s_neg: 0.04
num_init_frames: 2
finite_difference_eps: 0.025
mesh_resolution: 0.03
