cfg_identifier: oren.trainer_config.TrainerConfig
trainer_identifier: oren.sdf_trainer.SdfTrainer   # oren.sdf_trainer.SdfTrainer | oren.occ_trainer.OccTrainer
seed: 12345
log_dir: logs
exp_name: oren_ros_sdf
device: cuda
data:
    cfg_identifier: oren.dataset.data_config.DataConfig
    dataset_name: ros
    dataset_args:
        min_depth: 0.8
        max_depth: 40.0
    apply_bound: false   # if false, bbox crop is applied after generate_sdf_samples via valid_mask
    bound_min:           # null -> derived/supplied at runtime by ROS service request
    bound_max:
    start_frame: 0
    end_frame: -1
bound_min: [-10, -10, -10] # used for mesh extraction; auto-overwritten from dataset bounds at trainer init
bound_max: [10, 10, 10]
key_frame_set:
    cfg_identifier: oren.key_frame_set.KeyFrameSetConfig
    insert_method: intersection   # naive | intersection
    insert_interval: 50
    insert_ratio: 0.7
    frame_selection: multiple_max_set_coverage   # multiple_max_set_coverage | random
    selection_window_size: 8
    frame_weight: uniform
model_identifier: oren.sdf_network.SdfNetwork
model:
    cfg_identifier: oren.sdf_network.SdfNetworkConfig
    octree_cfg:
        cfg_identifier: oren.octree_config.OctreeConfig
        resolution: 0.7
        tree_depth: 8   # 0.7*2^8 = 112 m
        semi_sparse_depth: 5
        init_voxel_num: 80000
        insertion_threshold: 3   # min points to insert a voxel
        skip_insertion_if_exists: true   # speed up a bit
        independent_smallest_leaf_vertex: false
    field:
        cfg_identifier: oren.field_storage_config.FieldStorageConfig
        name: sdf
        output_dim: 1
        mode: hybrid
        explicit_prior_init: 0.0
        gradient_augmentation: true
        implicit_feature_dim: 3
        implicit_feature_level: 1
        implicit_feature_aggregation: cat
        shared_bank:
        auxiliary_banks: []
        implicit_net_cfg:
            cfg_identifier: oren.implicit_net.ImplicitNetConfig
            mlp_activation: LeakyReLU
            hidden_dims: [32, 32]
            normalization: # null | "LayerNorm" | "BatchNorm1d"
            output_scale: 0.1
            output_dim: 1
            input_dim: 1 # overwritten at runtime by FieldStorage from the assembled head-input dim
criterion_identifier: oren.sdf_criterion.SdfCriterion
criterion:
    cfg_identifier: oren.sdf_criterion.SdfCriterionConfig
    boundary_loss_weight: 100
    boundary_loss_prior_weight: 100
    boundary_loss_type: L1   # L1 | L2
    perturbation_loss_weight: 100
    perturbation_loss_prior_weight: 100
    perturbation_loss_type: L1   # L1 | L2
    perturbation_loss_exp_penalty: 1.0
    eikonal_loss_surface_weight: 30
    eikonal_loss_surface_prior_weight: 30
    eikonal_loss_perturbation_weight: 50
    eikonal_loss_perturbation_prior_weight: 50
    eikonal_loss_space_weight: 100
    eikonal_loss_space_prior_weight: 100
    eikonal_loss_type: L1   # L1 | L2
    projection_loss_weight: 100
    projection_loss_prior_weight: 100
    projection_loss_type: L1   # L1 | L2
    heat_loss_weight: 0.0
    heat_loss_lambda: 4.0
    sign_loss_free_weight: 0.0
    sign_loss_occ_weight: 0.0
    sign_loss_temperature: 100.0
num_init_frames: 3
init_frame_iterations: 10
num_iterations_per_frame: 1
num_rays_total: 20480
extra_surface_sample: false   # not helpful
frame_downsample: 10
sample_rays:
    cfg_identifier: oren.utils.sampling.SampleRaysConfig
    n_stratified: 1
    n_perturbed_pos: 1
    n_perturbed_neg: 1
    depth_min: 0.8
    depth_max: 40.0
    surface_margin: 1.44
    sigma_s_pos: 0.48
    sigma_s_neg: 0.48
batch_size: 204800
lr: 0.005
grad_method: finite_difference   # autodiff | finite_difference
finite_difference_eps: 0.03
final_iterations: 0   # extra iterations after all frames processed; 0 = none
final_evaluate: true   # call evaluate() in the cleanup finally
final_save_model: true   # write final.pth in the cleanup finally
save_mesh: true
mesh_resolution: 0.2
mesh_iso_value: 0.0
clean_mesh: true
save_slice: true
slice_center:   # null -> use center of the scene bounding box
ckpt_interval: -1   # -1 = no intermediate checkpoints
profiling: false
profiling_verbose: false
frozen_model_path:   # null -> train from scratch; otherwise load a frozen prior model
