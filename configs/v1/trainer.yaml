identifier: oren.trainer_config.TrainerConfig
seed: 12345
log_dir: logs
exp_name: oren
device: cuda
data:
    identifier: oren.dataset.data_config.DataConfig
    dataset_name: replica
    dataset_args:
        data_path: ""
        min_depth: 0.0
        max_depth: -1.0
    apply_bound: false   # if false, bbox crop is applied after generate_sdf_samples via valid_mask
    bound_min:           # null -> dataset auto-derives from mesh
    bound_max:
    start_frame: 0
    end_frame: -1
bound_min:               # used for mesh extraction; auto-overwritten from dataset bounds at trainer init
bound_max:
key_frame_set:
    identifier: oren.key_frame_set.KeyFrameSetConfig
    insert_method: intersection
    insert_interval: 50
    insert_ratio: 0.85
    frame_selection: multiple_max_set_coverage
    selection_window_size: 8
    frame_weight: uniform
model:
    identifier: oren.model.SdfNetworkConfig
    octree_cfg:
        identifier: oren.octree_config.OctreeConfig
        resolution: 0.1
        tree_depth: 8
        semi_sparse_depth: 5
        init_voxel_num: 200000
        insertion_threshold: 3
        skip_insertion_if_exists: false   # does not help
        gradient_augmentation: true
    residual_net_cfg:
        identifier: oren.residual_net.ResidualNetConfig
        resolution: 0.1
        num_levels: 4
        feature_dims: 2
        log2_T: 19
        per_level_scale: 2.0
        mlp_activation: ReLU
        hidden_dims: [64, 64]
        scale_with_bound: true
        output_sdf_scale: 0.1
criterion:
    identifier: oren.criterion.CriterionConfig
    boundary_loss_weight: 1000
    boundary_loss_type: L1
    perturbation_loss_weight: 200
    perturbation_loss_type: L1
    eikonal_loss_surface_weight: 3
    eikonal_loss_space_weight: 10
    eikonal_loss_type: L1
    projection_loss_weight: 100
    projection_loss_type: L1
    heat_loss_weight: 0.0
    heat_loss_lambda: 4.0
    sign_loss_free_weight: 0.0
    sign_loss_occ_weight: 0.0
    sign_loss_temperature: 100.0
num_init_frames: 3
init_frame_iterations: 10
num_iterations_per_frame: 1
num_rays_total: 20480
extra_surface_sample: false   # not helpful
frame_downsample: 100
sample_rays:
    identifier: oren.utils.sampling.SampleRaysConfig
    n_stratified: 1
    n_perturbed: 2
    depth_min: 0.07
    depth_max: 10.0
    surface_margin: 0.08
    sigma_s: 0.06
batch_size: 204800
lr: 0.005
grad_method: finite_difference
finite_difference_eps: 0.03
final_iterations: 0
save_mesh: true
mesh_resolution: 0.02
mesh_iso_value: 0.0
clean_mesh: true
ckpt_interval: -1
profiling: false
profiling_verbose: false
